version: '3.8'
services:
  # Container Apache & PHP
  web:
    image: php:8.1-apache
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    restart: always
    # Pastikan ekstensi mysql terinstall
    command: >
      sh -c "docker-php-ext-install mysqli && apache2-foreground"

  # Container Database MySQL
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: gasku_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"