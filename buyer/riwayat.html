<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riwayat — GasKu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <span class="logo-icon">🔥</span><span>GasKu</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Beranda</a></li>
      <li><a href="produk.html">Produk</a></li>
      <li><a href="pesanan.html">Pesanan Saya</a></li>
      <li><a href="riwayat.html" class="active">Riwayat</a></li>
    </ul>
    <div class="nav-actions">
      <a href="keranjang.html" class="btn-cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
      <a href="profil.html" class="btn-profile">
        <img src="https://ui-avatars.com/api/?name=Budi+Santoso&background=ff6b35&color=fff&size=36" alt="Profil">
        <span>Budi</span>
      </a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <span class="section-label">Pembelian</span>
    <h1>Riwayat <span class="highlight">Pembelian</span></h1>
    <p>Semua transaksi gas Anda tercatat di sini</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="filter-bar">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="historySearch" placeholder="Cari berdasarkan ID atau produk…">
      </div>
      <select class="sort-select" id="filterMonth">
        <option value="all">Semua Waktu</option>
        <option value="this-month">Bulan Ini</option>
        <option value="last-month">Bulan Lalu</option>
        <option value="3-months">3 Bulan Terakhir</option>
      </select>
    </div>

    <!-- Stats Summary -->
    <div class="history-stats">
      <div class="hstat-card">
        <span class="hstat-num" id="totalOrders">0</span>
        <span class="hstat-label">Total Pesanan</span>
      </div>
      <div class="hstat-card">
        <span class="hstat-num" id="totalSpend">Rp 0</span>
        <span class="hstat-label">Total Pengeluaran</span>
      </div>
      <div class="hstat-card">
        <span class="hstat-num" id="totalTabung">0</span>
        <span class="hstat-label">Tabung Dibeli</span>
      </div>
      <div class="hstat-card">
        <span class="hstat-num">98%</span>
        <span class="hstat-label">Tepat Waktu</span>
      </div>
    </div>

    <div class="history-list" id="historyList"></div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script src="assets/js/cart.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/riwayat.js"></script>
</body>
</html>
